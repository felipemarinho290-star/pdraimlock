<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pdraimlock</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle, #0d0d0d, #000);
    color: #00ffcc;
    text-align: center;
}

h1 {
    margin-top: 20px;
    font-size: 28px;
    text-shadow: 0 0 10px #00ffcc;
}

.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 30px;
}

.card {
    background: #111;
    border: 1px solid #00ffcc;
    border-radius: 15px;
    padding: 20px;
    margin: 15px;
    width: 260px;
    box-shadow: 0 0 15px #00ffcc;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.switch {
    position: relative;
    display: inline-block;
    width: 60px;
    height: 30px;
}

.switch input {
    display: none;
}

.slider {
    position: absolute;
    background: #444;
    border-radius: 30px;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    cursor: pointer;
}

.slider:before {
    content: "";
    position: absolute;
    height: 24px;
    width: 24px;
    left: 3px;
    bottom: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.3s;
}

input:checked + .slider {
    background: #00ffcc;
}

input:checked + .slider:before {
    transform: translateX(30px);
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    background: #00ffcc;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00ccaa;
}

.footer {
    margin-top: 40px;
    font-size: 14px;
    color: #888;
}
</style>
</head>

<body>

<h1>⚡ pdraimlock ⚡</h1>

<div class="container">

    <div class="card">
        <h2>🎯 Aim Assist</h2>
        <label class="switch">
            <input type="checkbox" id="aim">
            <span class="slider"></span>
        </label>
        <p>Status: <span id="aimStatus">OFF</span></p>
    </div>

    <div class="card">
        <h2>🧱 Wall Vision</h2>
        <label class="switch">
            <input type="checkbox" id="wall">
            <span class="slider"></span>
        </label>
        <p>Status: <span id="wallStatus">OFF</span></p>
    </div>

    <div class="card">
        <h2>⚡ Speed Boost</h2>
        <input type="range" min="1" max="10" value="1" id="speed">
        <p>Valor: <span id="speedValue">1</span></p>
    </div>

</div>

<button onclick="baixarConfig()">⬇️ Baixar Configuração</button>

<div class="footer">
    Desenvolvido por Pedro Henrique
</div>

<script>
const aim = document.getElementById("aim");
const wall = document.getElementById("wall");
const speed = document.getElementById("speed");

aim.addEventListener("change", () => {
    document.getElementById("aimStatus").textContent = aim.checked ? "ON" : "OFF";
});

wall.addEventListener("change", () => {
    document.getElementById("wallStatus").textContent = wall.checked ? "ON" : "OFF";
});

speed.addEventListener("input", () => {
    document.getElementById("speedValue").textContent = speed.value;
});

function baixarConfig() {
    const config = {
        nome: "pdraimlock",
        aim: aim.checked,
        wall: wall.checked,
        speed: speed.value,
        data: new Date().toLocaleString()
    };

    const blob = new Blob([JSON.stringify(config, null, 2)], { type: "application/json" });
    const a = document.createElement("a");

    a.href = URL.createObjectURL(blob);
    a.download = "config_pdraimlock.json";
    a.click();
}
</script>

</body>
</html>

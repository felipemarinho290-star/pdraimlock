<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pdraimlock</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: #00ffcc;
    overflow: hidden;
}

/* Fundo animado */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* Login */
#login {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #111;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 0 20px #00ffcc;
    text-align: center;
}

input {
    padding: 10px;
    margin: 10px;
    border: none;
    border-radius: 5px;
    width: 200px;
}

button {
    padding: 10px 20px;
    background: #00ffcc;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

/* Painel */
#painel {
    display: none;
    text-align: center;
    padding-top: 20px;
}

.card {
    background: #111;
    border: 1px solid #00ffcc;
    border-radius: 15px;
    padding: 20px;
    margin: 15px auto;
    width: 250px;
    box-shadow: 0 0 15px #00ffcc;
}

/* Toggle */
.switch {
    position: relative;
    display: inline-block;
    width: 60px;
    height: 30px;
}
.switch input {display:none;}

.slider {
    position: absolute;
    background: #444;
    border-radius: 30px;
    top: 0; left: 0; right: 0; bottom: 0;
}

.slider:before {
    content: "";
    position: absolute;
    height: 24px;
    width: 24px;
    left: 3px;
    bottom: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.3s;
}

input:checked + .slider {
    background: #00ffcc;
}
input:checked + .slider:before {
    transform: translateX(30px);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- LOGIN -->
<div id="login">
    <h2>🔐 pdraimlock</h2>
    <input type="text" id="user" placeholder="Usuário"><br>
    <input type="password" id="pass" placeholder="Senha"><br>
    <button onclick="entrar()">Entrar</button>
</div>

<!-- PAINEL -->
<div id="painel">
    <h1>⚡ pdraimlock ⚡</h1>

    <div class="card">
        <h3>Aim Assist</h3>
        <label class="switch">
            <input type="checkbox" id="aim">
            <span class="slider"></span>
        </label>
    </div>

    <div class="card">
        <h3>Wall Vision</h3>
        <label class="switch">
            <input type="checkbox" id="wall">
            <span class="slider"></span>
        </label>
    </div>

    <div class="card">
        <h3>Speed</h3>
        <input type="range" min="1" max="10" id="speed">
    </div>
</div>

<script>
/* LOGIN */
function entrar(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u === "pedro" && p === "123"){
        document.getElementById("login").style.display = "none";
        document.getElementById("painel").style.display = "block";
    } else {
        alert("Login errado");
    }
}

/* SALVAR CONFIG */
const aim = document.getElementById("aim");
const wall = document.getElementById("wall");
const speed = document.getElementById("speed");

function salvar(){
    localStorage.setItem("config", JSON.stringify({
        aim: aim.checked,
        wall: wall.checked,
        speed: speed.value
    }));
}

aim.onchange = salvar;
wall.onchange = salvar;
speed.oninput = salvar;

/* FUNDO ANIMADO */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*2,
        dx: Math.random()-0.5,
        dy: Math.random()-0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#00ffcc";

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;
    });

    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
